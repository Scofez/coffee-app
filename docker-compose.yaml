services:
  db:
    image: postgres:15
    container_name: coffee_db
    environment:
      POSTGRES_USER: nassim
      POSTGRES_PASSWORD: nassimpassword
      POSTGRES_DB: coffee_shop
    ports:
      - "5430:5432"

  app:
    build: .
    volumes:
      - .:/app            # Links your current folder to /app in the container
      - /app/node_modules # Prevents your local node_modules from overwriting the container's
    environment:
      - DATABASE_URL=postgresql://nassim:nassimpassword@db:5430/coffee_shop
    command: pnpm dev     # Run the dev command with the loader